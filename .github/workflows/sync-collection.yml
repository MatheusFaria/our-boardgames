name: Sync Collection Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"
  push:
    paths:
      - "collections/**/*.csv"
      - "scripts/fetch_bgg_collections.py"
      - ".github/workflows/sync-collection.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Regenerate collection snapshot
        env:
          BGG_TOKEN: ${{ secrets.BGG_TOKEN }}
        run: python3 scripts/fetch_bgg_collections.py

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/collection.json; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/collection.json
          git commit -m "chore: refresh collection snapshot"
          git push
